{
  "layer": "top",
  "position": "top",

  "modules-left": [
    "niri/workspaces",
    "niri/window",
  ],

  "modules-center": [
    "custom/startmenu",
  ],

  "modules-right": [
    "mpris",
    "group/tray-expander",
    "custom/vpn",
    "clock",
    "custom/exit"
  ],

  "group/tray-expander": {
    "orientation": "inherit",
    "drawer": {
      "click-to-reveal": true,
      "transition-right-to-left": true,
      "transition-duration": 600,
      "children-class": "tray-group-item"
    },
    "modules": [
      "custom/expand-icon",
      "pulseaudio",
      "disk",
      "memory",
      "network",
      "cpu",
      "tray",
      "custom/notification",
    ]
  },
  "niri/workspaces": {
    "format": "{name}",
    "current-only": true,
  },
  "wlr/taskbar": {
    "tooltip-format": "{title} | {app_id}",
},

  "clock": {
    "format": "ΎΑΩ {:%H:%M}",
    "tooltip": true,
    "tooltip-format": "<big>{:%A, %d.%B %Y }</big><tt><small>{calendar}</small></tt>"
  },

  "niri/window": {
    "separate-outputs": false
  },

  "memory": {
    "interval": 5,
    "format": "ΎΘΑ {}%",
    "tooltip": true,
    "on-click": "ghostty -e btop"
  },

  "cpu": {
    "interval": 5,
    "format": "ΎΜδ {usage:2}%",
    "tooltip": true,
    "on-click": "ghostty -e btop"
  },

  "disk": {
    "format": "ΎΑβ {free}",
    "tooltip": true
    // "on-click": "ghostty -e sh -c df -h ; read"
  },

  "network": {
    "format-icons": [
      "≤░νψ",
      "≤░νθ",
      "≤░νλ",
      "≤░νξ",
      "≤░νρ"
    ],
    "format-ethernet": "ΎΒμ {bandwidthDownBits}",
    "format-wifi": "ΎΒμ {bandwidthDownBits}",
    "format-disconnected": "≤░νχ",
    "tooltip": false,
    "on-click": "ghostty -e btop"
  },

  "custom/vpn": {
    "exec": "ip link show wg0 2>/dev/null | grep -q UP && echo '{\"text\":\"ΏθΦΤ VPN-CSD\"}' || echo '{\"text\":\"null\"}'",
    "interval": 5,
    "return-type": "json",
    "on-click": "wg-quick up wg0 || wg-quick down wg0"
    "tooltip": true,
    "tooltip-format": "WireGuard VPN Status"
  },



  "custom/expand-icon": {
    "format": "ΎΓΜ",
    "tooltip": false
  },

  "tray": {
    "icon-size": 12,
    "spacing": 12
  },

  "pulseaudio": {
    "format": "{icon} {volume}% {format_source}",
    "format-bluetooth": "{volume}% {icon}ΎΛΦ {format_source}",
    "format-bluetooth-muted": "Ύγσ {icon}ΎΛΦ {format_source}",
    "format-muted": "Ύγσ {format_source}",
    "format-source": "ΎΕ░ {volume}%",
    "format-source-muted": "ΎΕ▒",
    "format-icons": {
      "headphone": "ΎΑξ",
      "hands-free": "ΎΨΡ",
      "headset": "ΎΨΡ",
      "phone": "ΎΓΧ",
      "portable": "ΎΓΧ",
      "car": "ΎΗ╣",
      "default": [
        "ΎΑο",
        "ΎΑπ",
        "ΎΑρ"
      ]
    },
    "on-click": "pavucontrol"
  },

  "custom/exit": {
    "tooltip": false,
    "format": "έΠ╗",
    "on-click": "sleep 0.1 && wlogout"
  },

  "custom/startmenu": {
    "tooltip": false,
    "format": "ΎΜε",
    "on-click": "wofi --show drun"
  },

  "custom/notification": {
    "tooltip": false,
    "format": "{icon}",
    "format-icons": {
      "notification": "ΎΔ│<span foreground='red'><sup>ΎΣΕ</sup></span>",
      "none": "ΎΔ│",
      "dnd-notification": "ΎΘ╢<span foreground='red'><sup>ΎΣΕ</sup></span>",
      "dnd-none": "ΎΘ╢",
      "inhibited-notification": "ΎΔ│<span foreground='red'><sup>ΎΣΕ</sup></span>",
      "inhibited-none": "ΎΔ│",
      "dnd-inhibited-notification": "ΎΘ╢<span foreground='red'><sup>ΎΣΕ</sup></span>",
      "dnd-inhibited-none": "ΎΘ╢"
    },
    "return-type": "json",
    "exec-if": "which swaync-client",
    "exec": "swaync-client -swb",
    "on-click": "swaync-client -t -sw",
    "on-click-right": "swaync-client -d -sw",
    "escape": true
  },

  "battery": {
    "states": {
      "warning": 30,
      "critical": 15
    },
    "format": "{icon} {capacity}%",
    "format-charging": "≤░ΓΕ {capacity}%",
    "format-plugged": "≤▒αΨ {capacity}%",
    "format-icons": [
      "≤░Β║",
      "≤░Β╗",
      "≤░Β╝",
      "≤░Β╜",
      "≤░Β╛",
      "≤░Β┐",
      "≤░ΓΑ",
      "≤░ΓΒ",
      "≤░ΓΓ",
      "≤░Β╣"
    ],
    "on-click": "",
    "tooltip": false
  },

  "mpris": {
    "format": "{player_icon} {dynamic}",
    "format-paused": "{status_icon} <i>{dynamic}</i>",
    "player-icons": {
      "default": "έΨ╢",
      "mpv": "ΏθΟ╡"
    },
    "status-icons": {
      "paused": "έΠ╕"
    },
    "ignored-players": [ "chromium" ],
    "max-length": 60
  }
}